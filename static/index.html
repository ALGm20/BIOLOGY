<title>UniPortal – علوم الحياة</title>

<style>
/* ══════════════ RESET & BASE ══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#app{height:100%;overflow:hidden}
body{font-family:'Cairo',sans-serif;background:#080d1a;color:#dde8f4;-webkit-font-smoothing:antialiased;overscroll-behavior:none;direction:rtl}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,200,255,.2);border-radius:4px}
button,input,textarea,select{font-family:inherit}

/* ══════════════ CSS VARIABLES ══════════════ */
:root{
  --bg:#080d1a;--bg2:#0d1829;--bg3:#111f3a;--bg4:#162240;
  --surface:rgba(13,24,41,.95);--hov:rgba(255,255,255,.045);
  --border:rgba(0,200,255,.1);--border2:rgba(255,255,255,.07);
  --text:#dde8f4;--text2:#6a8aaa;--text3:#2a4560;
  --accent:#00d4ff;--green:#22c55e;--purple:#a855f7;
  --yellow:#f59e0b;--red:#ef4444;--orange:#fb923c;
  --msg-mine:linear-gradient(135deg,#1a4a80,#1a5a9a);
  --msg-other:rgba(255,255,255,.08);
  --nav-bg:rgba(8,13,26,.97);--sidebar:rgba(10,18,34,.98);
  --card:rgba(13,24,41,.9);--card-border:rgba(0,200,255,.12);
  --shadow:0 8px 32px rgba(0,0,0,.6);
  --inp-bg:rgba(255,255,255,.07);--inp-border:rgba(255,255,255,.1);
}
body.light{
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#e8eef5;--bg4:#dce6f0;
  --surface:rgba(255,255,255,.98);--hov:rgba(0,0,0,.035);
  --border:rgba(0,100,200,.12);--border2:rgba(0,0,0,.08);
  --text:#1a2840;--text2:#5a7090;--text3:#9ab0c8;
  --accent:#0066cc;--green:#16a34a;--purple:#7c3aed;
  --yellow:#d97706;--red:#dc2626;--orange:#ea580c;
  --msg-mine:linear-gradient(135deg,#0055cc,#0077ee);
  --msg-other:rgba(255,255,255,.98);
  --nav-bg:rgba(255,255,255,.97);--sidebar:rgba(248,252,255,.98);
  --card:rgba(255,255,255,.95);--card-border:rgba(0,100,200,.14);
  --shadow:0 4px 24px rgba(0,0,0,.1);
  --inp-bg:rgba(0,0,0,.04);--inp-border:rgba(0,0,0,.1);
}
body.ltr{direction:ltr;font-family:'Poppins','Cairo',sans-serif}

/* ══════════════ ANIMATIONS ══════════════ */
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes msgIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes iosIn{from{opacity:0;transform:translateX(-50%) translateY(-130%)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes iosOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(-130%)}}
@keyframes pulse{0%,100%{opacity:.12}50%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pdfIn{from{opacity:0;transform:scaleY(.96)}to{opacity:1;transform:scaleY(1)}}
@keyframes countUp{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}

/* ══════════════ COMPONENTS ══════════════ */
.glass{background:var(--surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:12px;transition:all .18s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#0055cc,#0088ff);color:#fff;padding:.65rem 1.5rem;font-size:.92rem}
.btn-primary:hover{opacity:.9;box-shadow:0 4px 20px rgba(0,136,255,.4);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.38;cursor:not-allowed;transform:none}
.btn-primary:active{transform:scale(.97)}
.btn-sec{background:rgba(0,180,255,.1);color:var(--accent);border:1px solid rgba(0,180,255,.22);padding:.5rem 1.1rem;font-size:.85rem}
.btn-sec:hover{background:rgba(0,180,255,.18)}
.btn-danger{background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.25);padding:.46rem .9rem;font-size:.82rem}
.btn-danger:hover{background:rgba(220,38,38,.2)}
.btn-sm{padding:.38rem .8rem;font-size:.8rem;border-radius:9px}
.btn-full{width:100%}
.btn-icon{width:38px;height:38px;border-radius:50%;background:transparent;color:var(--text2);font-size:1.1rem;padding:0}
.btn-icon:hover{background:var(--hov);color:var(--text)}
.btn-icon:active{transform:scale(.88)}

/* Inputs */
.inp{background:var(--inp-bg);border:1px solid var(--inp-border);color:var(--text);border-radius:24px;padding:.6rem 1rem;font-family:inherit;font-size:.9rem;outline:none;direction:auto;transition:border-color .2s,box-shadow .2s;width:100%}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,200,255,.12)}
.inp::placeholder{color:var(--text3)}
.inp-flat{background:var(--inp-bg);border:1px solid var(--inp-border);color:var(--text);border-radius:14px;padding:.68rem 1rem;font-family:inherit;font-size:.92rem;outline:none;direction:auto;width:100%;transition:border-color .2s}
.inp-flat:focus{border-color:var(--accent)}
.inp-flat::placeholder{color:var(--text3)}
textarea.inp-flat{resize:vertical;min-height:80px}

/* Cards */
.card{background:var(--card);border:1px solid var(--card-border);border-radius:18px;box-shadow:var(--shadow)}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:.22rem;padding:.1rem .5rem;border-radius:99px;font-size:.68rem;font-weight:800}

/* Toggle */
.toggle{position:relative;width:48px;height:26px;cursor:pointer;border-radius:99px;border:none;outline:none;transition:background .25s;flex-shrink:0}
.toggle-dot{position:absolute;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .25s;box-shadow:0 2px 6px rgba(0,0,0,.25)}

/* Nav bottom */
.nav-b{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.16rem;cursor:pointer;color:var(--text3);transition:color .18s;padding:.44rem .5rem;flex:1;font-size:.6rem;font-weight:700;position:relative;user-select:none;border:none;background:transparent}
.nav-b.on{color:var(--accent)}
.nav-b:hover{color:var(--accent)}

/* Channel rows */
.ch-row{display:flex;align-items:center;gap:.7rem;padding:.58rem 1rem;cursor:pointer;transition:background .12s;border-radius:0}
.ch-row:hover{background:var(--hov)}
.ch-row.sel{background:rgba(0,200,255,.09)}

/* Tab buttons */
.tab-b{padding:.44rem .9rem;border-radius:10px;cursor:pointer;border:none;font-weight:700;font-size:.82rem;transition:all .18s;background:transparent;color:var(--text3)}
.tab-b.on{background:rgba(0,200,255,.12);color:var(--accent)}
.tab-b:hover{color:var(--accent)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:900;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);animation:fadeIn .18s}
.modal-box{background:var(--bg2);border-radius:22px 22px 0 0;width:100%;max-width:520px;padding:1.5rem 1.3rem 2.4rem;max-height:90vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.16,1,.3,1)}
.modal-title{font-weight:800;font-size:1.05rem;color:var(--accent);margin-bottom:1.25rem}

/* Ann cards */
.ann-card{background:var(--card);border:1px solid var(--card-border);border-radius:18px;padding:1.1rem 1.2rem;margin-bottom:.75rem;animation:slideUp .3s ease;transition:box-shadow .2s,border-color .2s}
.ann-card:hover{box-shadow:var(--shadow);border-color:rgba(0,200,255,.22)}

/* Message bubbles */
.msg-wrap{display:flex;gap:8px;margin-bottom:6px;animation:msgIn .22s ease;align-items:flex-end}
.msg-mine{flex-direction:row-reverse}
.bubble{padding:9px 13px;word-break:break-word;line-height:1.65;font-size:.9rem;box-shadow:var(--shadow)}
.bubble-mine{background:var(--msg-mine);color:#fff;border-radius:18px 18px 5px 18px}
.bubble-other{background:var(--msg-other);color:var(--text);border-radius:18px 18px 18px 5px;border:1px solid var(--border2)}

/* Setting rows */
.setting-row{display:flex;align-items:center;gap:12px;padding:13px 1.2rem;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border2)}
.setting-row:hover{background:var(--hov)}

/* Bio background cells */
.bio-cell{position:absolute;border-radius:50%;border:1px solid;animation:pulse ease-in-out infinite}

/* Notification banner */
.notif-banner{position:fixed;top:10px;left:50%;transform:translateX(-50%);width:min(calc(100% - 20px),400px);z-index:9999;cursor:pointer}
.notif-inner{background:rgba(18,28,52,.97);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:22px;padding:10px 14px;box-shadow:0 20px 60px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.07);display:flex;align-items:center;gap:12px;direction:rtl}
body.light .notif-inner{background:rgba(245,249,255,.97);box-shadow:0 8px 40px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.06)}
.notif-app-icon{width:52px;height:52px;border-radius:15px;flex-shrink:0;background:linear-gradient(145deg,#063070,#0058d0);border:1px solid rgba(0,200,255,.25);display:flex;align-items:center;justify-content:center;font-size:1.65rem;box-shadow:0 4px 18px rgba(0,60,200,.4)}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* Bio BG */
#bio-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.body-light #bio-bg{display:none}

/* Spinner */
.spin{animation:spin 1s linear infinite;display:inline-block}

/* Layout */
#app{display:flex;flex-direction:column;position:relative}
#main-layout{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}
#topbar{height:52px;min-height:52px;display:flex;align-items:center;padding:0 1rem;gap:.75rem;background:var(--nav-bg);border-bottom:1px solid var(--border);z-index:10;backdrop-filter:blur(20px)}
#sidebar{width:300px;min-width:260px;max-width:320px;border-inline-end:1px solid var(--border);display:flex;flex-direction:column;background:var(--sidebar)}
#main-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
#bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--nav-bg);backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0}

/* PDF Viewer */
#pdf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:800;display:flex;flex-direction:column;animation:fadeIn .2s;backdrop-filter:blur(14px)}
.pdf-page-inner{background:#fff;max-width:640px;width:100%;border-radius:8px;box-shadow:0 4px 32px rgba(0,0,0,.5);animation:pdfIn .3s ease}

/* Avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;overflow:hidden;position:relative}
.online-dot{position:absolute;bottom:0;right:0;width:28%;height:28%;border-radius:50%;background:var(--green);border:2px solid var(--bg2)}

/* Attach menu */
#attach-menu{position:absolute;bottom:115%;right:0;background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:10px;display:flex;flex-direction:column;gap:6px;min-width:160px;box-shadow:var(--shadow);z-index:50;animation:slideUp .2s ease}
.attach-item{display:flex;align-items:center;gap:9px;background:transparent;border:none;color:var(--text);cursor:pointer;padding:8px 10px;border-radius:10px;transition:background .12s;font-size:.87rem;font-family:inherit;width:100%;text-align:right}
.attach-item:hover{background:var(--hov)}

/* Lightbox */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:900;display:flex;align-items:center;justify-content:center;cursor:zoom-out;backdrop-filter:blur(10px);animation:fadeIn .2s}

/* Badge counter */
.badge{background:var(--red);color:#fff;border-radius:99px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:900;padding:0 4px;position:absolute;top:-4px;right:-5px}

@media(max-width:700px){.dsk{display:none!important}}
@media(min-width:701px){.mob{display:none!important}}
</style>

/* ══════════════════════════════════════════════
   CONTEXT
══════════════════════════════════════════════ */
const Ctx = createContext(null);
const useApp = () => useContext(Ctx);

/* ══════════════════════════════════════════════
   API HELPER
══════════════════════════════════════════════ */
const API = {
  async call(method, path, body=null, isForm=false) {
    const opts = { method, headers:{} };
    if (body) {
      if (isForm) { opts.body = body; }
      else { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
    }
    const res = await fetch(path, opts);
    if (res.status === 401) { window.location.reload(); return null; }
    return res.json();
  },
  get: (p)    => API.call('GET', p),
  post: (p,b) => API.call('POST', p, b),
  patch: (p,b)=> API.call('PATCH', p, b),
  del: (p)    => API.call('DELETE', p),
  postForm: (p,f) => API.call('POST', p, f, true),
};

function timeLabel(iso, lang) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date(), diff = now - d;
  if (diff < 60000)    return lang==='ar'?'الآن':'now';
  if (diff < 3600000)  return lang==='ar'?`${Math.floor(diff/60000)}د`:`${Math.floor(diff/60000)}m`;
  if (diff < 86400000) return d.toLocaleTimeString(lang==='ar'?'ar-IQ':'en',{hour:'2-digit',minute:'2-digit'});
  if (diff < 172800000)return lang==='ar'?'أمس':'Yesterday';
  return d.toLocaleDateString(lang==='ar'?'ar-IQ':'en',{month:'short',day:'numeric'});
}

const inits = nm => (nm||'').trim().split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';

function Avatar({user,size=40,showDot=false}) {
  const rd = user ? getRD(user.role) : {clr:'#888'};
  return (
    <div className="avatar" style={{width:size,height:size,
      background:`linear-gradient(135deg,${rd.clr}28,${rd.clr}12)`,
      border:`2px solid ${rd.clr}30`,fontSize:size*.3,color:rd.clr}}>
      {user?.photo_url

        : inits(user?.name_ar||user?.name||'')
      }
      {showDot && user?.online && <div className="online-dot"/>}

  );
}

/* ══════════════════════════════════════════════

══════════════════════════════════════════════ */
function NotifBanner({notif,onDismiss}) {
  const {lang,t} = useApp();
  const [out,setOut] = useState(false);
  useEffect(()=>{
    const t1=setTimeout(()=>setOut(true),4500);
    const t2=setTimeout(onDismiss,5100);
    return ()=>{clearTimeout(t1);clearTimeout(t2)};
  },[notif.id]);
  const title = lang==='ar'?(notif.title_ar||notif.title):notif.title_en||notif.title;
  const body  = lang==='ar'?(notif.body_ar||notif.body):notif.body_en||notif.body;
  return (
    <div className="notif-banner" onClick={()=>{setOut(true);setTimeout(onDismiss,500);}}>
      <div className="notif-inner" style={{animation:out?'iosOut .5s cubic-bezier(.16,1,.3,1) forwards':'iosIn .55s cubic-bezier(.16,1,.3,1)'}}>
        <div className="notif-app-icon">🧬</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
            <span style={{fontSize:'.62rem',fontWeight:800,color:'var(--text3)',letterSpacing:'.1em',textTransform:'uppercase'}}>UNIPORTAL</span>

          <div style={{fontWeight:800,fontSize:'.91rem',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{title}</div>
          <div style={{fontSize:'.77rem',color:'var(--text2)',marginTop:2,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{body}</div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   MESSAGE BUBBLE
══════════════════════════════════════════════ */
function MsgBubble({msg,myUser,onDelete,onEdit}) {
  const {lang,t} = useApp();
  const [pdfOpen,setPdfOpen] = useState(false);
  const [imgFull,setImgFull] = useState(false);
  const mine = msg.sender_id === myUser.id;
  const text  = msg.text || '';

  if (msg.msg_type === 'sys') return (
    <div style={{textAlign:'center',padding:'.3rem 0',margin:'.2rem 0'}}>
      <span style={{background:'var(--hov)',color:'var(--text2)',fontSize:'.73rem',padding:'.2rem .9rem',borderRadius:99}}>{text}</span>
    </div>
  );

  const bubbleContent = () => {
    if (msg.msg_type === 'txt')  return <p style={{whiteSpace:'pre-wrap',fontSize:'.9rem',lineHeight:1.65}}>{text}</p>;
    if (msg.msg_type === 'pdf')  return (
      <>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
          background:mine?'rgba(255,255,255,.1)':'rgba(0,100,200,.07)',
          border:`1px solid ${mine?'rgba(255,255,255,.15)':'rgba(0,100,200,.15)'}`,
          borderRadius:12,cursor:'pointer',maxWidth:260}}
          onClick={()=>setPdfOpen(true)}>
          <div style={{width:42,height:50,borderRadius:8,background:'rgba(220,50,50,.18)',
            border:'1px solid rgba(220,50,50,.3)',display:'flex',alignItems:'center',
            justifyContent:'center',fontSize:'1.4rem',flexShrink:0}}>📄</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:'.82rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{msg.file_name}</div>
            <div style={{fontSize:'.71rem',color:mine?'rgba(255,255,255,.6)':'var(--text2)',marginTop:3}}>PDF · {t.download}</div>
          </div>
        </div>
        {pdfOpen && <PDFViewer filename={msg.file_name} onClose={()=>setPdfOpen(false)}/>}
      </>
    );
    if (msg.msg_type === 'img')  return (
      <>
        <div style={{borderRadius:10,overflow:'hidden',cursor:'zoom-in',maxWidth:240,
          border:'1px solid var(--border)'}} onClick={()=>setImgFull(true)}>
          {msg.file_path
            ? <img src={msg.file_path} alt="" style={{width:'100%',display:'block',maxHeight:240,objectFit:'cover'}}/>
            : (
              <svg viewBox="0 0 300 200" style={{width:'100%',display:'block',background:'#020810'}}>
                <rect width="300" height="200" fill="#020a1a"/>
                {[[40,75,30,22,'#00d4ff'],[110,55,24,32,'#22c55e'],[195,90,36,24,'#a855f7'],
                  [95,145,28,36,'#00d4ff'],[230,155,22,26,'#f59e0b']].map(([cx,cy,rx,ry,c],i)=>(
                  <g key={i}>
                    <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill={`${c}18`} stroke={c} strokeWidth="1.2" opacity=".7"/>
                    <circle cx={cx} cy={cy} r={rx*.3} fill={`${c}28`} stroke={c} strokeWidth=".7" opacity=".8"/>
                  </g>
                ))}
              </svg>
            )
          }
        </div>
        {imgFull && (
          <div id="lightbox" onClick={()=>setImgFull(false)}>
            {msg.file_path
              ? <img src={msg.file_path} alt="" style={{maxWidth:'90vw',maxHeight:'90vh',borderRadius:12,objectFit:'contain'}}/>
              : <svg viewBox="0 0 600 400" style={{width:'min(90vw,600px)',borderRadius:12}}>
                  <rect width="600" height="400" fill="#020a1a"/>
                  {[[80,130,55,42,'#00d4ff'],[200,100,44,58,'#22c55e'],[340,160,65,46,'#a855f7'],
                    [470,230,38,48,'#00d4ff'],[150,280,42,56,'#22c55e']].map(([cx,cy,rx,ry,c],i)=>(
                    <g key={i}><ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill={`${c}14`} stroke={c} strokeWidth="1.5" opacity=".7"/>
                    <circle cx={cx} cy={cy} r={rx*.3} fill={`${c}22`} stroke={c} strokeWidth="1" opacity=".8"/></g>
                  ))}
                </svg>
            }
          </div>
        )}
      </>
    );
    if (msg.msg_type === 'lnk')  {
      const dom = (msg.link_url||'').replace(/https?:\/\//,'').split('/')[0];
      return (
        <a href={msg.link_url} target="_blank" rel="noopener"
          style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
            background:mine?'rgba(255,255,255,.1)':'rgba(0,100,200,.07)',
            border:`1px solid ${mine?'rgba(255,255,255,.15)':'rgba(0,100,200,.15)'}`,

          <div style={{flex:1,minWidth:0}}>
            {text && <div style={{fontSize:'.82rem',lineHeight:1.3,marginBottom:2}}>{text}</div>}
            <div style={{fontSize:'.75rem',color:'var(--accent)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{dom}</div>
          </div>
          <span style={{color:'var(--text3)',fontSize:'.85rem'}}>↗</span>
        </a>
      );
    }
    return null;
  };

  const sender = msg.sender_name;
  const rd = msg.sender_role ? getRD(msg.sender_role) : null;

  return (
    <div className={`msg-wrap ${mine?'msg-mine':''}`}>
      {!mine && (
        <div style={{width:30,height:30,borderRadius:'50%',
          background:`${rd?.clr||'#888'}20`,border:`1.5px solid ${rd?.clr||'#888'}30`,
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:'.7rem',fontWeight:900,color:rd?.clr||'#888',flexShrink:0}}>
          {inits(sender||'')}
        </div>
      )}
      <div style={{maxWidth:'72%',display:'flex',flexDirection:'column',alignItems:mine?'flex-end':'flex-start'}}>
        {!mine && sender && (
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
            <span style={{fontSize:'.76rem',fontWeight:800,color:rd?.clr||'var(--text2)'}}>
              {sender.split(' ')[0]}
            </span>
            {rd && <Pill role={msg.sender_role}/>}
          </div>
        )}
        <div className={`bubble ${mine?'bubble-mine':'bubble-other'}`}>
          {bubbleContent()}
        </div>
        {/* 3 dots */}
        <button className="dots-btn" onClick={e=>{e.stopPropagation();setMenu(m=>!m);}}
          style={{[mine?'left':'right']:4}}>⋮</button>
        {menu&&(
          <div className="msg-menu" ref={menuRef} style={{[mine?'right':'left']:0,top:'100%',marginTop:2,position:'absolute'}}>
            {mine&&msg.msg_type==='txt'&&<button className="mm-item" onClick={()=>{setMenu(false);setEditing(true);}}>✏️ {lang==='ar'?'تعديل':'Edit'}</button>}
            {mine&&<button className="mm-item del" onClick={()=>{setMenu(false);onDelete&&onDelete(msg.id);}}>🗑️ {lang==='ar'?'حذف':'Delete'}</button>}
            <button className="mm-item" onClick={()=>setMenu(false)}>↩️ {lang==='ar'?'رد':'Reply'}</button>
          </div>
        )}
        <div style={{fontSize:'.66rem',color:'var(--text3)',marginTop:3,display:'flex',alignItems:'center',gap:4}}>
          {timeLabel(msg.created_at, lang)}
          {mine && <span style={{fontSize:'.8rem'}}>✓</span>}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   CHAT WINDOW
══════════════════════════════════════════════ */
function ChatWindow({ch,onBack,isDesktop}) {
  const {myUser,t,lang,pushNotif} = useApp();
  const [msgs,setMsgs] = useState([]);
  const [loading,setLoading] = useState(true);
  const [txt,setTxt] = useState('');
  const [pdfName,setPdfName] = useState(null);
  const [linkMode,setLinkMode] = useState(false);
  const [linkUrl,setLinkUrl] = useState('');
  const [attachOpen,setAttachOpen] = useState(false);
  const [imgFile,setImgFile] = useState(null);
  const bottomRef = useRef();
  const fileRef   = useRef();
  const imgRef    = useRef();
  const canWrite  = ch.can_write;

  useEffect(()=>{
    setLoading(true);
    API.get(`/api/channels/${ch.ch_key}/messages`).then(data=>{
      if(data) setMsgs(data.messages||[]);
      setLoading(false);
    });
  },[ch.ch_key]);

  useEffect(()=>{
    if(msgsRef.current){
      msgsRef.current.scrollTop=msgsRef.current.scrollHeight;
    }
  },[msgs.length]);

  const doSend = async () => {
    const fd = new FormData();
    if (txt.trim()) fd.append('text', txt.trim());
    if (linkMode && linkUrl.trim()) fd.append('link_url', linkUrl.trim());
    if (pdfName && fileRef.current?.files[0]) fd.append('file', fileRef.current.files[0]);
    if (imgFile && imgRef.current?.files[0]) fd.append('file', imgRef.current.files[0]);
    if (!txt.trim() && !linkUrl.trim() && !pdfName && !imgFile) return;
    const data = await API.postForm(`/api/channels/${ch.ch_key}/messages`, fd);
    if (data?.ok) {
      setMsgs(m=>[...m,data.message]);
      setTxt(''); setLinkUrl(''); setLinkMode(false); setPdfName(null); setImgFile(null);
      setAttachOpen(false);
      const nm = lang==='ar'?(ch.name_ar||ch.name):ch.name_en||ch.name_ar||'';
      pushNotif({title_ar:`رسالة في ${nm}`,title_en:`Message in ${nm}`,body_ar:txt.slice(0,60)||'📎',body_en:txt.slice(0,60)||'📎'});
    }
  };

  const chName = lang==='ar'?(ch.name_ar||ch.name_en):(ch.name_en||ch.name_ar||'');

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      {/* Header */}
      <div style={{height:56,minHeight:56,display:'flex',alignItems:'center',gap:10,
        padding:'0 12px',background:'var(--nav-bg)',borderBottom:'1px solid var(--border)',
        zIndex:5,backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)'}}>
        {!isDesktop && <button className="btn btn-icon" onClick={onBack} style={{fontSize:'1.2rem'}}>←</button>}
        <ChAvatar ch={ch} size={38}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:'.92rem',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{chName}</div>
          <div style={{fontSize:'.71rem',color:'var(--text2)'}}>{ch.desc_ar||ch.desc_en}</div>
        </div>
        <button className="btn btn-icon">🔍</button>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'12px 8px 8px',display:'flex',flexDirection:'column',gap:2}}>
        {loading && <div style={{textAlign:'center',padding:'2rem',color:'var(--text3)'}}><span className="spin">⟳</span> {t.loading}</div>}
        {!loading && msgs.length===0 && (
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,color:'var(--text3)',padding:'2rem'}}>
            <ChAvatar ch={ch} size={64}/>
            <div style={{fontWeight:700,color:'var(--text2)'}}>{chName}</div>
            <div style={{fontSize:'.8rem',textAlign:'center',maxWidth:220,lineHeight:1.6}}>{ch.desc_ar||ch.desc_en}</div>
            {!canWrite && <div style={{fontSize:'.78rem',color:'var(--text3)'}}>🔒 {t.readOnlyNote}</div>}
          </div>
        )}
        {msgs.map((m,i)=><MsgBubble key={m.id||i} msg={m} myUser={myUser} onDelete={doDelete} onEdit={doEdit}/>)}
        <div ref={bottomRef}/>
      </div>

      {/* Compose */}
      {canWrite ? (
        <div style={{background:'var(--nav-bg)',borderTop:'1px solid var(--border)',padding:'10px 12px',backdropFilter:'blur(20px)'}}>
          {linkMode && (
            <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
              <input className="inp" placeholder="https://..." dir="ltr" value={linkUrl}
                onChange={e=>setLinkUrl(e.target.value)} style={{flex:1,fontSize:'.85rem'}}/>
              <button className="btn btn-icon" onClick={()=>setLinkMode(false)} style={{color:'var(--red)'}}>✕</button>
            </div>
          )}
          {pdfName && (
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,
              background:'rgba(0,120,200,.07)',border:'1px solid var(--border)',borderRadius:10,padding:'7px 10px'}}>
              <span>📄</span>
              <span style={{flex:1,fontSize:'.82rem',color:'var(--accent)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pdfName}</span>
              <button className="btn btn-icon" style={{width:26,height:26,color:'var(--red)'}} onClick={()=>{setPdfName(null);fileRef.current.value=''}}>✕</button>
            </div>
          )}
          {imgFile && (
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,
              background:'rgba(34,197,94,.07)',border:'1px solid rgba(34,197,94,.2)',borderRadius:10,padding:'7px 10px'}}>
              <span>🖼️</span>

  );
}

/* ══════════════════════════════════════════════
   CHANNEL LIST
══════════════════════════════════════════════ */
function ChList({channels,active,onSelect,onCreateCh}) {
  const {myUser,t,lang,pushNotif} = useApp();
  const [search,setSearch] = useState('');
  const rd = getRD(myUser.role);
  const filt = useMemo(()=>channels.filter(ch=>{
    if(!search) return true;
    const nm=(lang==='ar'?(ch.name_ar||ch.name_en):(ch.name_en||ch.name_ar)||'').toLowerCase();
    return nm.includes(search.toLowerCase());
  }),[channels,search,lang]);

  const sec=(type,label)=>{
    const list=filt.filter(c=>c.ch_type===type);
    if(!list.length) return null;
    return (
      <>
        <div style={{padding:'8px 14px 3px',fontSize:'.63rem',fontWeight:800,color:'var(--text3)',letterSpacing:'.11em',textTransform:'uppercase'}}>{label}</div>
        {list.map(ch=>{
          const nm=(lang==='ar'?(ch.name_ar||ch.name_en):(ch.name_en||ch.name_ar)||'').replace(/[\p{Emoji}\u{1F300}-\u{1FFFF}]/gu,'').trim();
          return (
            <div key={ch.ch_key||ch.id} className={`ch-row${active?.ch_key===ch.ch_key?' sel':''}`} onClick={()=>onSelect(ch)}>
              <ChAvatar ch={ch} size={46}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                  <span style={{fontWeight:700,fontSize:'.87rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,
                    color:active?.ch_key===ch.ch_key?'var(--accent)':'var(--text)'}}>{nm}</span>
                  {ch.last_time&&<span style={{fontSize:'.66rem',color:'var(--text3)',flexShrink:0,marginInlineStart:4}}>{timeLabel(ch.last_time,lang)}</span>}
                </div>
                <span style={{fontSize:'.76rem',color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}}>
                  {ch.last_msg||(lang==='ar'?(ch.desc_ar||ch.desc_en):(ch.desc_en||ch.desc_ar)||'').slice(0,40)}
                </span>
              </div>
              {ch.unread>0&&<div style={{background:'var(--accent)',color:'#000',borderRadius:99,minWidth:18,height:18,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.62rem',fontWeight:900,padding:'0 4px'}}>{ch.unread}</div>}
            </div>
          );
        })}
      </>
    );
  };

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--sidebar)'}}>
      <div style={{padding:'12px 12px 8px',borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <span style={{fontWeight:900,fontSize:'1.1rem',background:'linear-gradient(90deg,var(--accent),var(--green))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>
            🧬 {t.app}
          </span>
          <div style={{display:'flex',gap:4}}>
            {rd.createCh && <button className="btn btn-icon" style={{background:'rgba(0,180,255,.1)',color:'var(--accent)'}} onClick={onCreateCh}>✏️</button>}
          </div>
        </div>
        <input className="inp" placeholder={`🔍 ${t.searchCh}`} value={search} onChange={e=>setSearch(e.target.value)}
          style={{fontSize:'.84rem',borderRadius:14,padding:'.5rem .9rem'}}/>
      </div>
      <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(255,255,255,.04)',display:'flex',alignItems:'center',gap:9}}>
        <Avatar user={myUser} size={36} showDot/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:'.83rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {lang==='ar'?(myUser.name_ar||myUser.name_en):(myUser.name_en||myUser.name_ar)}
          </div>
          <Pill role={myUser.role}/>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto'}}>
        {sec('ann',lang==='ar'?'📢 إعلانات':'📢 General')}
        {sec('doc',lang==='ar'?'🔬 قنوات الدكاتره':'🔬 Lecture Channels')}
        {sec('rep',lang==='ar'?'📣 قنوات الممثلين':'📣 Rep Channels')}
        {filt.length===0&&<div style={{textAlign:'center',padding:'3rem 1rem',color:'var(--text3)',fontSize:'.85rem'}}>{t.noChannels}</div>}
        <div style={{height:16}}/>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   ANNOUNCEMENT CARD

  const title   = lang==='ar'?(ann.title_ar||ann.title_en):(ann.title_en||ann.title_ar)||'';
  const content = lang==='ar'?(ann.content_ar||ann.content_en):(ann.content_en||ann.content_ar)||'';

  return (
    <div className="ann-card">
      {ann.pinned && (
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,fontSize:'.74rem',color:'var(--yellow)',fontWeight:700}}>
          📌 {t.pinned}
        </div>
      )}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:'.85rem'}}>
        <div style={{width:44,height:44,borderRadius:14,flexShrink:0,
          background:`${ann.color||'#0066cc'}18`,border:`1px solid ${ann.color||'#0066cc'}28`,
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.4rem'}}>
          {ann.emoji||'📢'}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:'.97rem',lineHeight:1.3}}>{title}</div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}>
            <span style={{fontSize:'.73rem',color:'var(--text2)'}}>{ann.author_name}</span>
            <span style={{fontSize:'.7rem',color:'var(--text3)'}}>· {timeLabel(ann.created_at,lang)}</span>
            <span style={{fontSize:'.7rem',color:'var(--text3)'}}>· 👁 {ann.views}</span>
          </div>
        </div>
      </div>
      <p style={{color:'var(--text2)',lineHeight:1.75,fontSize:'.88rem',marginBottom:'.85rem',whiteSpace:'pre-wrap'}}>{content}</p>
      {ann.file_name && (
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
          background:'var(--hov)',border:'1px solid var(--border)',
          borderRadius:12,cursor:'pointer',marginBottom:'.6rem'}}
          onClick={()=>onPdfOpen(ann.file_name)}>
          <span style={{fontSize:'1.3rem'}}>📄</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:'.84rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ann.file_name}</div>
            <div style={{fontSize:'.71rem',color:'var(--text2)',marginTop:2}}>PDF · {t.download}</div>
          </div>
          <span style={{color:'var(--accent)',fontWeight:700}}>⬇️</span>
        </div>
      )}
      {ann.link_url && (
        <a href={ann.link_url} target="_blank" rel="noopener"
          style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
            background:'var(--hov)',border:'1px solid var(--border)',
            borderRadius:12,textDecoration:'none',color:'inherit',marginBottom:'.6rem'}}>
          <span style={{fontSize:'1.3rem'}}>🔗</span>
          <div style={{flex:1,color:'var(--accent)',fontSize:'.85rem',fontWeight:700}}>{ann.link_label||ann.link_url}</div>
          <span style={{color:'var(--text3)',fontSize:'.85rem'}}>↗</span>
        </a>
      )}
      {(canDelete||canPin) && (
        <div style={{display:'flex',gap:8,marginTop:'.75rem',paddingTop:'.75rem',borderTop:'1px solid var(--border2)'}}>
          {canPin && <button className="btn btn-sec btn-sm" onClick={()=>onPin(ann.id)}>{ann.pinned?`📌 ${t.unpin}`:`📌 ${t.pin}`}</button>}
          {canDelete && <button className="btn btn-danger btn-sm" onClick={()=>onDelete(ann.id)}>🗑️</button>}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   ANNOUNCEMENTS VIEW
══════════════════════════════════════════════ */
function AnnsView() {
  const {myUser,t,lang,pushNotif} = useApp();
  const [anns,setAnns] = useState([]);
  const [loading,setLoading] = useState(true);
  const [compose,setCompose] = useState(false);
  const [pdfFile,setPdfFile] = useState(null);
  const [form,setForm] = useState({title_ar:'',content_ar:'',pinned:false,emoji:'📢',color:'#0066cc'});
  const rd = getRD(myUser.role);
  const fileRef = useRef();

  useEffect(()=>{
    API.get('/api/announcements').then(data=>{ if(data){setAnns(data);setLoading(false);} });
  },[]);

  const postAnn = async () => {
    const fd = new FormData();
    Object.entries(form).forEach(([k,v])=>fd.append(k,v));
    if(fileRef.current?.files[0]) fd.append('file',fileRef.current.files[0]);
    const data = await API.postForm('/api/announcements', fd);
    if(data?.ok){
      setAnns(a=>[data.announcement,...a]);
      setCompose(false);
      setForm({title_ar:'',content_ar:'',pinned:false,emoji:'📢',color:'#0066cc'});
      pushNotif({title_ar:form.title_ar,title_en:form.title_ar,body_ar:form.content_ar?.slice(0,60),body_en:form.content_ar?.slice(0,60)});
    }
  };

  const deleteAnn = async (id) => {
    if(!confirm(lang==='ar'?'حذف الإعلان؟':'Delete this announcement?')) return;
    await API.del(`/api/announcements/${id}`);
    setAnns(a=>a.filter(x=>x.id!==id));
  };

  const pinAnn = async (id) => {
    const data = await API.post(`/api/announcements/${id}/pin`);
    if(data?.ok) setAnns(a=>a.map(x=>x.id===id?{...x,pinned:data.pinned}:x));
  };

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',background:'var(--nav-bg)',
        display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:'1.4rem'}}>📢</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:'.97rem'}}>{t.anns}</div>
          <div style={{fontSize:'.73rem',color:'var(--text2)'}}>{t.annDesc}</div>
        </div>
        {rd.postGen && <button className="btn btn-sec btn-sm" onClick={()=>setCompose(true)}>+ {t.newAnn}</button>}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'1rem'}}>
        {loading && <div style={{textAlign:'center',padding:'3rem',color:'var(--text3)'}}><span className="spin">⟳</span></div>}
        {!loading && anns.filter(a=>a.pinned).length>0 && (
          <div style={{fontSize:'.7rem',color:'var(--text3)',fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',marginBottom:'.6rem'}}>📌 {t.pinned}</div>
        )}
        {anns.filter(a=>a.pinned).map(a=>(
          <AnnCard key={a.id} ann={a} onPdfOpen={setPdfFile} onDelete={deleteAnn} onPin={pinAnn}
            canDelete={a.author_id===myUser.id||rd.admin} canPin={rd.postGen||rd.admin}/>
        ))}
        {anns.filter(a=>!a.pinned).length>0 && (
          <div style={{fontSize:'.7rem',color:'var(--text3)',fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',marginBottom:'.6rem',marginTop:'.5rem'}}>
            {lang==='ar'?'الأخيرة':'Recent'}
          </div>
        )}
        {anns.filter(a=>!a.pinned).map(a=>(
          <AnnCard key={a.id} ann={a} onPdfOpen={setPdfFile} onDelete={deleteAnn} onPin={pinAnn}
            canDelete={a.author_id===myUser.id||rd.admin} canPin={rd.postGen||rd.admin}/>
        ))}
      </div>

      {compose && (
        <div className="modal-bg" onClick={()=>setCompose(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">📢 {t.newAnn}</div>
            <div style={{display:'flex',flexDirection:'column',gap:'.9rem',marginBottom:'1rem'}}>
              <input className="inp-flat" placeholder={t.annTitle} value={form.title_ar} onChange={e=>setForm({...form,title_ar:e.target.value})}/>
              <textarea className="inp-flat" placeholder={t.annContent} value={form.content_ar} onChange={e=>setForm({...form,content_ar:e.target.value})} rows={4}/>
              <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:'.85rem',color:'var(--text2)'}}>
                  <Toggle on={form.pinned} onChange={v=>setForm({...form,pinned:v})} color="#f59e0b"/>
                  📌 {t.pin}
                </label>
                <input className="inp-flat" type="file" ref={fileRef} accept=".pdf" style={{flex:1,minWidth:100,fontSize:'.82rem'}}/>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary btn-full" disabled={!form.title_ar.trim()} onClick={postAnn}>{t.postAnn}</button>
              <button className="btn btn-sec" onClick={()=>setCompose(false)}>{t.cancel}</button>
            </div>
          </div>
        </div>
      )}
      {pdfFile && <PDFViewer filename={pdfFile} onClose={()=>setPdfFile(null)}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════
   NOTIFICATIONS VIEW
══════════════════════════════════════════════ */
function NotifsView({refresh}) {
  const {lang,t} = useApp();
  const [notifs,setNotifs] = useState([]);
  const [loading,setLoading] = useState(true);

  const load = async () => {
    const data = await API.get('/api/notifications');
    if(data){ setNotifs(data.notifications||[]); setLoading(false); }
  };
  useEffect(()=>{ load(); },[refresh]);

  const markAll = async () => {
    await API.post('/api/notifications/read_all');
    setNotifs(n=>n.map(x=>({...x,is_read:true})));
  };

  const unreadCnt = notifs.filter(n=>!n.is_read).length;

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',background:'var(--nav-bg)',
        display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:'1.4rem'}}>🔔</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:'.97rem'}}>{t.notifs}</div>
          <div style={{fontSize:'.73rem',color:'var(--text2)'}}>{unreadCnt} {t.unread}</div>
        </div>
        {unreadCnt>0 && <button className="btn btn-sec btn-sm" onClick={markAll}>{t.markAllRead}</button>}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'.75rem'}}>
        {loading && <div style={{textAlign:'center',padding:'3rem',color:'var(--text3)'}}><span className="spin">⟳</span></div>}
        {!loading && notifs.length===0 && (
          <div style={{textAlign:'center',padding:'4rem 2rem',color:'var(--text3)'}}>
            <div style={{fontSize:'3rem',marginBottom:'.75rem'}}>🔕</div>
            <div style={{fontSize:'.9rem'}}>{t.noNotifs}</div>
          </div>
        )}
        {notifs.map((n,i)=>{
          const title=lang==='ar'?(n.title_ar||n.title_en):(n.title_en||n.title_ar)||'';
          const body =lang==='ar'?(n.body_ar||n.body_en):(n.body_en||n.body_ar)||'';
          return (
            <div key={n.id} style={{padding:'12px 14px',borderRadius:14,marginBottom:6,cursor:'pointer',
              background:n.is_read?'var(--card)':`rgba(0,180,255,.07)`,
              border:`1px solid ${n.is_read?'var(--card-border)':'rgba(0,180,255,.22)'}`,
              transition:'background .15s',animation:`slideUp .3s ease ${i*.04}s both`,position:'relative'}}
              onClick={async()=>{ await API.post(`/api/notifications/${n.id}/read`); setNotifs(ns=>ns.map(x=>x.id===n.id?{...x,is_read:true}:x)); }}>
              {!n.is_read && <div className="unread-dot" style={{position:'absolute',top:14,insetInlineEnd:14}}/>}
              <div style={{fontWeight:700,fontSize:'.88rem',marginBottom:3}}>{title}</div>
              <div style={{color:'var(--text2)',fontSize:'.8rem',lineHeight:1.5}}>{body}</div>
              <div style={{color:'var(--text3)',fontSize:'.72rem',marginTop:6}}>{timeLabel(n.created_at,lang)}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CreateChModal({onDone,onClose}) {
  const {myUser,t,lang} = useApp();
  const [name,setName] = useState('');
  const [desc,setDesc] = useState('');
  const chType = myUser.role==='دكتور'?'doc':'rep';
  const photoRef = useRef();
  const [photoFile,setPhotoFile] = useState(null);

  const create = async () => {
    const data = await API.post('/api/channels',{
      name_ar:name,name_en:name,
      desc_ar:desc,desc_en:desc,
    });
    if(data?.ok){
      // upload photo if any
      if(photoFile){
        const fd=new FormData();fd.append('photo',photoFile);fd.append('ch_key',data.channel.ch_key);
        await API.postForm('/api/upload-channel-photo',fd);
      }
      onDone(data.channel);
    }
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">✨ {t.createChannel}</div>
        <div style={{background:'rgba(0,200,255,.07)',border:'1px solid var(--border)',borderRadius:12,padding:'10px 14px',marginBottom:'1rem',fontSize:'.82rem',color:'var(--text2)'}}>
          {chType==='doc'
            ? '🔬 قناة محاضرات – للقراءة فقط من قِبل طلابك'
            : '📣 قناة ممثل – إعلانات لطلاب شعبتك'
          }
          <br/>⚠️ {lang==='ar'?'لا يستطيع رئيس القسم أو المقرر رؤية هذه القناة':'Dept. Head & Coordinator cannot see this channel'}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'.9rem',marginBottom:'1.2rem'}}>
          <input className="inp-flat" placeholder={t.chName} value={name} onChange={e=>setName(e.target.value)}/>
          <input className="inp-flat" placeholder={t.chDesc} value={desc} onChange={e=>setDesc(e.target.value)}/>
          <div>
            <label style={{fontSize:'.79rem',color:'var(--text2)',display:'block',marginBottom:5,fontWeight:700}}>
              {lang==='ar'?'صورة القناة (اختياري)':'Channel Photo (optional)'}
            </label>
            <input className="inp-flat" type="file" accept="image/*" onChange={e=>setPhotoFile(e.target.files[0]||null)}/>
          </div>
        </div>
        <button className="btn btn-primary btn-full" disabled={!name.trim()} onClick={create}>{t.createChannel}</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════ */
function App() {
  const [dark,setDark_] = useState(true);
  const [lang,setLang_] = useState('ar');
  const [myUser,setMyUser] = useState(null);
  const [channels,setChannels] = useState([]);
  const [activeCh,setActiveCh] = useState(null);
  const [navTab,setNavTab] = useState('chats');
  const [showCreate,setShowCreate] = useState(false);
  const [notifQ,setNotifQ] = useState([]);
  const [notifRefresh,setNotifRefresh] = useState(0);
  const nRef = useRef(0);
  const [isDesktop,setIsDesktop] = useState(window.innerWidth>700);

  useEffect(()=>{
    const fn=()=>setIsDesktop(window.innerWidth>700);
    window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);
  },[]);

  const setDark = (v) => {
    setDark_(v);
    document.body.classList.toggle('light',!v);
  };
  const setLang = (fn) => {
    setLang_(fn);
    const next = typeof fn==='function'?fn(lang):fn;
    document.body.classList.toggle('ltr', next!=='ar');
    document.documentElement.lang = next;
    document.documentElement.dir  = next==='ar'?'rtl':'ltr';
  };

  const t = T[lang] || T.ar;

  const pushNotif = useCallback((n) => {
    const notif = {...n, id:++nRef.current, time:new Date().toISOString()};
    setNotifQ(q=>[...q,notif]);
    setNotifRefresh(r=>r+1);
  },[]);

  // Load channels when user logs in
  const loadChannels = async () => {
    const data = await API.get('/api/channels');
    if(data && Array.isArray(data)) setChannels(data);
  };

  const handleLogin = (user) => {
    setMyUser(user);
    loadChannels();
    // Register service worker
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  };

  const handleLogout = async () => {
    await API.post('/api/logout');
    setMyUser(null); setChannels([]); setActiveCh(null); setNavTab('chats');
  };

  const rd = myUser ? getRD(myUser.role) : null;
  const totalUnread = 0; // simplified

  const ctx = {myUser,setMyUser,channels,setChannels,dark,setDark,lang,setLang,t,pushNotif,dir:lang==='ar'?'rtl':'ltr'};

  // Nav items
  const navItems = myUser ? [
    {id:'chats',  icon:'💬',label:t.chats,   badge:0},
    {id:'anns',   icon:'📢',label:t.anns,    badge:0},
    {id:'notifs', icon:'🔔',label:t.notifs,  badge:0},
    ...(rd?.admin?[{id:'admin',icon:'⚙️',label:t.admin,badge:0}]:[]),
    {id:'settings',icon:'👤',label:t.settings,badge:0},
  ] : [];

  // Main content panel
  const mainContent = () => {
    if(navTab==='chats' && activeCh)
      return <ChatWindow ch={activeCh} onBack={()=>setActiveCh(null)} isDesktop={isDesktop}/>;
    if(navTab==='chats')
      return (
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'1rem',color:'var(--text3)',padding:'2rem',background:'var(--bg)'}}>
          <div style={{fontSize:'4rem',opacity:.2}}>🧬</div>
          <div style={{fontWeight:700,color:'var(--text2)'}}>{t.selectChannel}</div>
          <div style={{fontSize:'.8rem'}}>{t.youHave} {channels.length} {t.visibleCh}</div>
        </div>
      );
    if(navTab==='anns') return <AnnsView/>;
    if(navTab==='notifs') return <NotifsView refresh={notifRefresh}/>;
    if(navTab==='admin' && rd?.admin) return <AdminView/>;
    if(navTab==='settings') return <SettingsView onLogout={handleLogout}/>;
    return null;
  };

  // Not logged in
  if(!myUser) return (
    <Ctx.Provider value={ctx}>
      <div style={{height:'100vh',position:'relative',overflow:'hidden',background:'var(--bg)'}}>
        <LoginScreen onLogin={handleLogin}/>
      </div>
    </Ctx.Provider>
  );

  return (
    <Ctx.Provider value={ctx}>
      <div id="app" style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden',position:'relative',background:'var(--bg)'}}>
        {/* Notifications */}
        {notifQ.slice(-1).map(n=>(
          <NotifBanner key={n.id} notif={n} onDismiss={()=>setNotifQ(q=>q.filter(x=>x.id!==n.id))}/>
        ))}

        {isDesktop ? (
          /* ══ DESKTOP LAYOUT ══ */
          <>
            <div id="topbar">
              <span style={{fontWeight:900,fontSize:'.95rem',background:'linear-gradient(90deg,var(--accent),var(--green))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>
                🧬 {t.app}
              </span>
              <div style={{flex:1,display:'flex',gap:6,justifyContent:'center'}}>
                {navItems.map(({id,icon,label,badge})=>(
                  <button key={id} className={`tab-b${navTab===id?' on':''}`}
                    style={{position:'relative'}}
                    onClick={()=>{setNavTab(id);if(id!=='chats')setActiveCh(null);}}>
                    {icon} {label}
                    {badge>0&&<span className="badge" style={{top:-2,right:-2}}>{badge>99?'99+':badge}</span>}
                  </button>
                ))}
              </div>
              <Avatar user={myUser} size={30} showDot/>
            </div>
            <div id="main-layout">
              <div id="sidebar">
                <ChList channels={channels} active={activeCh}
                  onSelect={ch=>{setActiveCh(ch);setNavTab('chats');}}
                  onCreateCh={()=>setShowCreate(true)}/>
              </div>
              <div id="main-area">{mainContent()}</div>
            </div>
          </>
        ) : (
          /* ══ MOBILE LAYOUT ══ */
          <>
            <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',position:'relative',zIndex:1}}>
              {navTab==='chats' && !activeCh
                ? <ChList channels={channels} active={null}
                    onSelect={ch=>{setActiveCh(ch);}}
                    onCreateCh={()=>setShowCreate(true)}/>
                : mainContent()
              }
            </div>
            {!activeCh && (
              <div id="bottom-nav">
                {navItems.map(({id,icon,label,badge})=>(
                  <button key={id} className={`nav-b${navTab===id?' on':''}`}
                    onClick={()=>{setNavTab(id);if(id!=='chats')setActiveCh(null);}}>
                    <span style={{fontSize:'1.35rem',position:'relative'}}>
                      {icon}
                      {badge>0&&<span className="badge">{badge>99?'99+':badge}</span>}
                    </span>
                    {label}
                  </button>
                ))}
              </div>
            )}
          </>
        )}

        {showCreate && rd?.createCh && (
          <CreateChModal
            onClose={()=>setShowCreate(false)}
            onDone={ch=>{
              setChannels(c=>[...c,ch]);
              setActiveCh(ch);setNavTab('chats');setShowCreate(false);
              pushNotif({title_ar:`✨ قناة جديدة: ${ch.name_ar}`,title_en:`✨ New: ${ch.name_en||ch.name_ar}`,
                body_ar:ch.desc_ar||'',body_en:ch.desc_en||''});
            }}/>
        )}
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
